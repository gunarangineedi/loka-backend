# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/loka_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:LOKASecretKey2024VeryLongAndSecureKeyForJWTSigning!@#$%}
jwt.expiration=86400000

# Logging
logging.level.com.loka=INFO
logging.level.org.springframework.security=WARN

# Max request size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
