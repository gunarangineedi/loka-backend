version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: loka-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loka_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: loka-backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/loka_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: LOKASecretKey2024VeryLongAndSecureKeyForJWTSigning!@#$%
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ../loka-frontend
    container_name: loka-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
