# ─────────────────────────────────────────────
# Server
# ─────────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────────
# Database
#
# LOCAL (MySQL):
#   DB_URL=jdbc:mysql://localhost:3306/loka_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#   DB_USERNAME=root  |  DB_PASSWORD=root
#
# RENDER (PostgreSQL - free tier):
#   DB_URL=jdbc:postgresql://<host>:5432/<dbname>
#   DB_USERNAME=<pg_user>  |  DB_PASSWORD=<pg_password>
#
# Spring Boot auto-detects the driver from the JDBC URL prefix.
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ─────────────────────────────────────────────
# JPA / Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Dialect auto-detected — no need to set manually for either MySQL or PostgreSQL

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET:LOKASecretKey2024VeryLongAndSecureKeyForJWTSigning!@#$%}
jwt.expiration=86400000

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.com.loka=INFO
logging.level.org.springframework.security=WARN

# ─────────────────────────────────────────────
# Upload limits
# ─────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
